<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuangTV — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --y:#FFCB05;--yd:rgba(255,179,0,.12);--by:rgba(255,179,0,.25);
    --bg:#0A0A0A;--bg2:#111;--bg3:#181818;--b:rgba(255,255,255,.07);
    --t:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.28);
    --g:#22C55E;--r:#EF4444;--rad:12px;
  }
  [data-theme="light"] {
    --bg:#F4F4F5;--bg2:#fff;--bg3:#F0F0F2;--b:rgba(0,0,0,.08);
    --t:#111;--t2:rgba(0,0,0,.55);--t3:rgba(0,0,0,.3);--y:#E6B800;
    --yd:rgba(230,184,0,.1);--by:rgba(180,144,0,.3);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}

  .bg-grid{position:fixed;inset:0;opacity:.025;
    background-image:radial-gradient(circle,#FFCB05 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;}
  .bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);
    width:600px;height:400px;
    background:radial-gradient(ellipse,rgba(255,179,0,.06),transparent 70%);
    pointer-events:none;}

  .card{
    background:var(--bg2);border:1px solid var(--b);border-radius:20px;
    padding:48px 44px;width:100%;max-width:420px;position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,.4);
    animation:slideUp .4s ease both;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

  .logo{display:flex;align-items:center;gap:12px;margin-bottom:36px;justify-content:center;}
  .logo-icon{width:44px;height:44px;background:var(--y);border-radius:12px;
    display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:24px;height:24px;fill:#000;}
  .logo-text{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;}
  .logo-text span{color:var(--y);}
  .logo-badge{font-size:10px;font-weight:600;letter-spacing:.08em;padding:2px 8px;
    border-radius:4px;background:var(--yd);border:1px solid var(--by);color:var(--y);}

  h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;margin-bottom:6px;}
  .subtitle{font-size:14px;color:var(--t2);margin-bottom:32px;}

  .form-group{margin-bottom:16px;}
  .form-label{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.04em;
    text-transform:uppercase;display:block;margin-bottom:8px;}
  .form-input{
    width:100%;background:var(--bg3);border:1px solid var(--b);
    border-radius:10px;padding:12px 16px;font-size:15px;color:var(--t);
    font-family:'Inter',sans-serif;transition:border-color .2s;outline:none;
  }
  .form-input:focus{border-color:var(--by);}
  .form-input::placeholder{color:var(--t3);}
  [data-theme="light"] .form-input{background:var(--bg3);color:var(--t);}

  .btn-login{
    width:100%;background:var(--y);color:#000;font-family:'Bebas Neue',sans-serif;
    font-size:18px;letter-spacing:.06em;padding:14px;border:none;border-radius:10px;
    cursor:pointer;transition:all .2s;margin-top:8px;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .btn-login:hover{background:#FFC107;transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,179,0,.3);}
  .btn-login:active{transform:translateY(0);}
  .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-login svg{width:18px;height:18px;fill:#000;}

  .error-msg{
    background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);
    border-radius:8px;padding:10px 14px;font-size:13px;color:var(--r);
    margin-bottom:16px;display:none;
  }
  .error-msg.show{display:block;}

  .server-status{
    display:flex;align-items:center;gap:8px;margin-top:24px;
    font-size:12px;color:var(--t3);justify-content:center;
  }
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);}
  .status-dot.online{background:var(--g);box-shadow:0 0 6px rgba(34,197,94,.5);}
  .status-dot.offline{background:var(--r);}

  .theme-btn{
    position:absolute;top:20px;right:20px;
    width:32px;height:32px;border-radius:8px;
    background:var(--bg3);border:1px solid var(--b);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--t2);transition:all .2s;
  }
  .theme-btn:hover{border-color:var(--by);color:var(--y);}
  .theme-btn svg{width:15px;height:15px;fill:currentColor;}

  .spinner{
    width:18px;height:18px;border:2px solid rgba(0,0,0,.2);
    border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;
  }
  .btn-login.loading .spinner{display:block;}
  .btn-login.loading .btn-text{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── GLOBAL TYPOGRAPHY FIXES ── */
  body {
    font-size: 14px;
    line-height: 1.6;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  p, span, div, a, label, td, th, li {
    letter-spacing: 0.01em;
  }
  /* Nav items */
  .nav-label { letter-spacing: 0.02em; font-size: 13px; font-weight: 500; }
  /* Topbar */
  .topbar-sub { font-size: 12px; letter-spacing: 0.03em; line-height: 1.5; }
  .topbar-title { letter-spacing: -0.01em; }
  /* Stat cards */
  .stat-label { font-size: 12px; letter-spacing: 0.04em; line-height: 1.5; font-weight: 500; }
  .stat-num { letter-spacing: -0.02em; line-height: 1; }
  /* Branch items */
  .branch-name { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; line-height: 1.4; }
  .branch-sub { font-size: 11px; letter-spacing: 0.02em; line-height: 1.5; margin-top: 3px; }
  .branch-code { font-size: 10px; letter-spacing: 0.1em; font-weight: 700; }
  /* Content rows */
  .content-name-txt { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; line-height: 1.4; }
  .content-meta-txt { font-size: 11px; letter-spacing: 0.02em; line-height: 1.5; margin-top: 3px; }
  /* Panel titles */
  .panel-title { font-size: 11px; letter-spacing: 0.08em; line-height: 1.4; }
  /* Section titles */
  .sec-title { font-size: 15px; letter-spacing: 0.01em; line-height: 1.3; }
  /* Buttons */
  .btn { font-size: 13px; letter-spacing: 0.02em; font-weight: 500; }
  .btn-yellow { letter-spacing: 0.03em; font-weight: 600; }
  /* Status badges */
  .status-badge { font-size: 10px; letter-spacing: 0.06em; line-height: 1; }
  .target-pill { font-size: 9px; letter-spacing: 0.06em; }
  /* TV cards */
  .tv-name { font-size: 12px; font-weight: 600; letter-spacing: 0.01em; line-height: 1.4; }
  .tv-content-name { font-size: 11px; letter-spacing: 0.01em; line-height: 1.4; margin-top: 2px; }
  /* Quick actions */
  .qa-label { font-size: 13px; font-weight: 600; letter-spacing: 0.01em; line-height: 1.4; }
  .qa-sub { font-size: 11px; letter-spacing: 0.02em; line-height: 1.5; margin-top: 2px; }
  /* Alert */
  .alert-msg { font-size: 13px; letter-spacing: 0.01em; line-height: 1.5; }
  /* Footer */
  .footer-left, .footer-right { font-size: 12px; letter-spacing: 0.02em; }
  /* Tabs */
  .tab { font-size: 12px; letter-spacing: 0.03em; font-weight: 500; }
  /* Schedule */
  .sch-time { font-size: 11px; letter-spacing: 0.02em; line-height: 1.4; }
  .sch-block { font-size: 10px; letter-spacing: 0.04em; font-weight: 600; }
  .sch-label { font-size: 10px; letter-spacing: 0.04em; }
  /* Form elements */
  .form-input, .form-select, .form-textarea {
    font-size: 14px; letter-spacing: 0.01em; line-height: 1.5;
  }
  .form-label { font-size: 11px; letter-spacing: 0.06em; line-height: 1.5; font-weight: 600; }
  /* Badges */
  .badge-broadcast { font-size: 12px; letter-spacing: 0.03em; }
  /* Bebas Neue headings — always need letter spacing */
  [style*="Bebas"], .topbar-title,
  .stat-num, .sec-title, .panel-title { }

</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="card">
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
    <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
  </button>

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M21 6H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1zm-1 10H4V8h16v8z"/><path d="M10 17h4v2h-4z"/></svg>
    </div>
    <div>
      <div class="logo-text">Ruang<span>TV</span></div>
    </div>
    <div class="logo-badge">HO</div>
  </div>

  <h1>Selamat Datang</h1>
  <p class="subtitle">Login untuk akses dashboard manajemen RuangTV</p>

  <div class="error-msg" id="error-msg"></div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="login-btn">
      <div class="spinner"></div>
      <span class="btn-text">MASUK KE DASHBOARD</span>
    </button>
  </form>

  <div class="server-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Memeriksa koneksi server...</span>
  </div>
</div>

<script src="ruangtv-api.js"></script>
<script>
  // ── Check if already logged in ──────────────────────────
  if (API.getToken()) window.location.href = 'ruangtv-dashboard.html';

  // ── Check server status ──────────────────────────────────
  async function checkServer() {
    try {
      const res = await fetch('http://localhost:3001/health');
      const data = await res.json();
      if (data.status === 'ok') {
        document.getElementById('status-dot').className = 'status-dot online';
        document.getElementById('status-text').textContent = `Server aktif · uptime ${data.uptime}s`;
      }
    } catch {
      document.getElementById('status-dot').className = 'status-dot offline';
      document.getElementById('status-text').textContent = 'Server tidak terhubung — jalankan node server.js';
    }
  }
  checkServer();
  setInterval(checkServer, 10000);

  // ── Login ────────────────────────────────────────────────
  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.classList.add('loading');
    btn.disabled = true;
    errEl.classList.remove('show');

    try {
      await API.login(username, password);
      window.location.href = 'ruangtv-dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  // ── Theme ────────────────────────────────────────────────
  const THEME_KEY = 'ruangtv-theme';
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(THEME_KEY, t);
    document.getElementById('theme-icon').innerHTML = t === 'light'
      ? '<path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>'
      : '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
  }
  function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
  applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
</script>
</body>
</html>
